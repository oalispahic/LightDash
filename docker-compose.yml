version: "3.9"

networks:
  app_net:

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    pid: host
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DOCKER_PROXY_URL=http://docker-proxy:2375
      - SYSD_URL=http://marex-sysd:4000
    volumes:
      - /sys/class/hwmon:/sys/class/hwmon:ro
      - ./backend/data:/app/data
      - ./backend/firmware:/app/firmware
    networks:
      - app_net
    depends_on:
      - docker-proxy
      - marex-sysd

  # Docker Engine API proxy. Backend never touches /var/run/docker.sock
  # directly — it talks HTTP to this container, which only permits the
  # whitelisted endpoints below.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1   # GET /containers/* only
      # All write ops (POST/DELETE), EXEC, IMAGES, VOLUMES, NETWORKS,
      # SWARM, SYSTEM, etc. remain disabled (default 0).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    security_opt:
      - no-new-privileges:true
    networks:
      - app_net

  # Systems agent — narrow whitelisted API for host-level operations.
  # Currently exposes /logs (read-only). Extend one action at a time.
  marex-sysd:
    build:
      context: ./marex-sysd
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - SYSD_TOKEN=${SYSD_TOKEN}
    volumes:
      - /var/log:/var/log:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    networks:
      - app_net
