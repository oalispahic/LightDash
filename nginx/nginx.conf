events {}

http {
  # Use Docker's embedded DNS so upstream IPs are re-resolved at request time
  # instead of being cached for the lifetime of the worker process.
  resolver 127.0.0.11 valid=10s ipv6=off;


  map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
  }

  server {
    listen 80;
    server_name marexdev.com www.marexdev.com;

    location / {
      set $upstream http://frontend:80;
      proxy_pass $upstream;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 80;
    server_name api.marexdev.com;

    # Allow ESP32-CAM uploads (UXGA JPEG ~300 KB)
    client_max_body_size 10m;

    location /api/ {
      set $upstream http://backend:3000;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      set $upstream http://backend:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }



server {
    listen 80;
    server_name photos.marexdev.com;

    client_max_body_size 50000M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    send_timeout 600s;

    location / {
        proxy_pass http://immich_server:2283;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;  

        proxy_buffering off;
    }
}


}
