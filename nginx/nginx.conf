events {}

http {
  # Use Docker's embedded DNS so upstream IPs are re-resolved at request time
  # instead of being cached for the lifetime of the worker process.
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name marexdev.com www.marexdev.com;

    location / {
      set $upstream http://frontend:80;
      proxy_pass $upstream;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 80;
    server_name api.marexdev.com;

    location / {
      set $upstream http://backend:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
